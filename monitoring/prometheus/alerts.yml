groups:
  - name: supachat_alerts
    interval: 30s
    rules:

      # ── Availability ─────────────────────────────────────────────────────
      - alert: BackendDown
        expr: up{job="supachat_backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SupaChat backend is down"
          description: "The FastAPI backend has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(supachat_requests_total{status=~"5.."}[5m])
          / rate(supachat_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate (>5%)"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # ── Latency ──────────────────────────────────────────────────────────
      - alert: HighP95Latency
        expr: |
          histogram_quantile(0.95,
            rate(supachat_request_duration_seconds_bucket{endpoint="/api/chat"}[5m])
          ) > 30
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Chat endpoint p95 latency > 30s"

      # ── Resources ─────────────────────────────────────────────────────────
      - alert: HighCPU
        expr: |
          100 - (avg by(instance) (
            rate(node_cpu_seconds_total{mode="idle"}[2m])
          ) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU > 85%"

      - alert: HighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory > 85%"

      - alert: ContainerOOMKilled
        expr: |
          kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container OOM killed"

      # ── Query Health ──────────────────────────────────────────────────────
      - alert: HighQueryErrorRate
        expr: |
          rate(supachat_queries_total{status="error"}[10m])
          / rate(supachat_queries_total[10m]) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Query error rate > 20%"
          description: "{{ $value | humanizePercentage }} of queries are failing."
